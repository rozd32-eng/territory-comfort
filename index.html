<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territory Comfort - Каталог товарів</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; padding: 20px; transition: all 0.3s; }
        body.dark { background: #1a1a2e; color: #eee; }
        body.dark .card, body.dark .filters, body.dark .stats-bar { background: #0f0f1a; color: #eee; border-color: #2a2a3e; }
        
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px 25px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo h1 { font-size: 24px; cursor: pointer; }
        .logo p { font-size: 11px; opacity: 0.8; }
        .cart-btn, .auth-btn, .theme-btn { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 40px; cursor: pointer; border: none; color: white; }
        .cart-count { background: #ff6b6b; border-radius: 20px; padding: 2px 8px; margin-left: 5px; }
        .contacts { display: flex; gap: 15px; font-size: 13px; }
        .profile-info { background: rgba(255,255,255,0.2); border-radius: 40px; padding: 5px 15px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .profile-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        
        .filters { background: white; padding: 15px; border-radius: 16px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 2; min-width: 200px; position: relative; }
        .search-box input { width: 100%; padding: 10px 40px 10px 15px; border: 1px solid #ddd; border-radius: 40px; }
        .voice-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #667eea; }
        select { padding: 10px 15px; border: 1px solid #ddd; border-radius: 40px; background: white; cursor: pointer; }
        .stats-bar { background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 16px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-3px); }
        .card-img { height: 180px; display: flex; align-items: center; justify-content: center; padding: 15px; background: #f7fafc; }
        .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .promo-badge { position: absolute; top: 10px; left: 10px; background: linear-gradient(135deg, #f093fb, #f5576c); color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; z-index: 2; }
        .card-info { padding: 15px; }
        .vendor { color: #667eea; font-size: 12px; margin-bottom: 5px; }
        .title { font-size: 14px; font-weight: 600; margin-bottom: 8px; min-height: 40px; line-height: 1.3; }
        .code { font-size: 11px; color: #999; margin-bottom: 8px; }
        .price-current { font-size: 20px; font-weight: 700; color: #48bb78; }
        .price-current:after { content: ' ₴'; }
        .price-old { font-size: 13px; color: #999; text-decoration: line-through; margin-left: 8px; }
        .stock { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; margin: 10px 0; }
        .stock-high { background: #48bb78; color: white; }
        .stock-low { background: #ed8936; color: white; }
        .stock-out { background: #fc8181; color: white; }
        .add-btn { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .pagination button { padding: 8px 20px; background: #667eea; color: white; border: none; border-radius: 30px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; }
        footer { text-align: center; padding: 20px; color: #999; margin-top: 30px; border-top: 1px solid #ddd; }
        .footer-contacts { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
        .footer-contacts a { color: #667eea; text-decoration: none; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #48bb78; color: white; padding: 10px 20px; border-radius: 10px; z-index: 1100; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading { text-align: center; padding: 50px; color: #666; }
        .to-top { position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; background: #667eea; color: white; border: none; border-radius: 50%; cursor: pointer; display: none; z-index: 1000; }
        @media (max-width: 640px) { .products-grid { grid-template-columns: 1fr; } .filters { flex-direction: column; } .contacts { display: none; } }
        
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: #333; border: 1px solid #ddd; }
        .google-btn img { width: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="location.reload()"><h1>🛒 Territory Comfort</h1><p>Актуальні ціни та наявність</p></div>
        <div class="contacts"><span>📞 +38 (073) 044-5800</span><span>📞 +38 (098) 044-5800</span></div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button class="theme-btn" onclick="toggleTheme()">🌙</button>
            <button class="cart-btn" onclick="openCart()">🛒 Кошик <span id="cartCount" class="cart-count">0</span></button>
            <div id="authContainer"></div>
        </div>
    </div>

    <div class="filters">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Пошук товарів...">
            <button class="voice-btn" onclick="startVoiceSearch()">🎤</button>
        </div>
        <select id="vendorSelect"><option value="">Всі вендори</option></select>
        <select id="categorySelect"><option value="">Всі категорії</option></select>
        <select id="sortSelect">
            <option value="default">За замовчуванням</option>
            <option value="price-asc">Ціна ↑</option>
            <option value="price-desc">Ціна ↓</option>
        </select>
        <select id="limitSelect"><option value="24">24</option><option value="48">48</option><option value="96">96</option></select>
    </div>

    <div class="stats-bar"><div id="statsText">📊 Завантаження...</div></div>

    <div class="products-grid" id="productsGrid"><div class="loading">⏳ Завантаження товарів...</div></div>
    <div class="pagination" id="pagination"><button id="prevPage" disabled>◀ Назад</button><span id="pageInfo">Сторінка 1</span><button id="nextPage">Вперед ▶</button></div>

    <footer>
        <div class="footer-contacts"><a href="#">📞 +38 (073) 044-5800</a><a href="#">📞 +38 (098) 044-5800</a><a href="#">📍 Київ</a><a href="#">📦 Доставка</a><a href="#">💳 Оплата</a><a href="#">📧 Контакти</a></div>
        <p>© 2025 Territory Comfort | Дані оновлюються автоматично</p>
    </footer>
    <button class="to-top" id="toTopBtn"><i class="fas fa-arrow-up"></i></button>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAgEV-Hzt5RW54isNoTmEQPqyUY_ndbb84",
            authDomain: "territory-comfort.firebaseapp.com",
            projectId: "territory-comfort",
            storageBucket: "territory-comfort.firebasestorage.app",
            messagingSenderId: "935081538509",
            appId: "1:935081538509:web:cd487e097352c98bd4ca84"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // Робимо функції глобальними
        window.googleSignIn = () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    localStorage.setItem('territory_current_user', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        fullName: user.displayName,
                        photoURL: user.photoURL
                    }));
                    window.location.reload();
                })
                .catch((error) => {
                    console.error('Google auth error:', error);
                    alert('Помилка входу: ' + error.message);
                });
        };
        
        window.logout = () => {
            signOut(auth).then(() => {
                localStorage.removeItem('territory_current_user');
                window.location.reload();
            });
        };
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('territory_current_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    fullName: user.displayName,
                    photoURL: user.photoURL
                }));
            }
        });
    </script>

    <script>
        // Firebase auth state
        let currentUser = JSON.parse(localStorage.getItem('territory_current_user') || 'null');
        
        function updateAuthUI() {
            const container = document.getElementById('authContainer');
            if (currentUser) {
                container.innerHTML = `<div class="profile-info">
                    ${currentUser.photoURL ? `<img src="${currentUser.photoURL}" class="profile-img">` : '<i class="fas fa-user-circle"></i>'}
                    <span>${currentUser.fullName || currentUser.email.split('@')[0]}</span>
                    <button class="auth-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Вихід</button>
                </div>`;
            } else {
                container.innerHTML = `<button class="auth-btn google-btn" onclick="googleSignIn()">
                    <img src="https://www.google.com/favicon.ico"> Увійти через Google
                </button>`;
            }
        }
        
        // Оновлюємо UI при зміні користувача
        setInterval(() => {
            const newUser = JSON.parse(localStorage.getItem('territory_current_user') || 'null');
            if (JSON.stringify(newUser) !== JSON.stringify(currentUser)) {
                currentUser = newUser;
                updateAuthUI();
                cart = JSON.parse(localStorage.getItem(`territory_cart_${currentUser?.uid || 'guest'}`) || '{}');
                updateCartUI();
            }
        }, 500);
        
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); }
        if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');
        
        function showToast(msg) { let t=document.createElement('div'); t.className='toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
        
        let cart = JSON.parse(localStorage.getItem(`territory_cart_${currentUser?.uid || 'guest'}`) || '{}');
        function updateCartUI() { let c = Object.values(cart).reduce((s,i)=>s+(i.qty||0),0); document.getElementById('cartCount').textContent = c; }
        function saveCart() { 
            const uid = currentUser?.uid || 'guest';
            localStorage.setItem(`territory_cart_${uid}`, JSON.stringify(cart));
            updateCartUI();
        }
        function addToCart(code, name, price) {
            if(!currentUser) { showToast('🔐 Увійдіть в акаунт'); return; }
            if(cart[code]) cart[code].qty += 1;
            else cart[code] = { name: name.substring(0,40), price: parseFloat(price), qty: 1 };
            saveCart();
            showToast(`✅ Додано (${price.toFixed(2)} ₴)`);
        }
        function openCart() {
            let items = Object.entries(cart);
            if(items.length === 0) { alert('Кошик порожній'); return; }
            let msg = '🛒 Ваш кошик:\n';
            let total = 0;
            items.forEach(([code, item]) => {
                msg += `\n${item.name} - ${item.price} ₴ x ${item.qty} = ${(item.price*item.qty).toFixed(2)} ₴`;
                total += item.price * item.qty;
            });
            msg += `\n\n💰 Загалом: ${total.toFixed(2)} ₴\n\nНатисніть ОК для оформлення замовлення`;
            if(confirm(msg + '\n\nОформити замовлення?')) {
                if(currentUser) {
                    let orders = JSON.parse(localStorage.getItem(`territory_orders_${currentUser.uid}`) || '[]');
                    orders.unshift({ id: Date.now(), date: new Date().toISOString(), items: Object.values(cart), total: total.toFixed(2) });
                    localStorage.setItem(`territory_orders_${currentUser.uid}`, JSON.stringify(orders));
                }
                alert('✅ Замовлення прийнято! Найближчим часом з вами зв\'яжуться.');
                cart = {};
                saveCart();
                updateCartUI();
            }
        }
        
        updateCartUI();
        
        function getStock(p) { 
            try {
                let w = p.whs?.find(w => w.id === 1); 
                if (w && w.q) return parseInt(String(w.q).replace(/[^0-9]/g, '')) || 0;
                return 0;
            } catch(e) { return 0; }
        }
        
        let recognition = null;
        if('webkitSpeechRecognition' in window) { 
            recognition = new webkitSpeechRecognition(); 
            recognition.lang = 'uk-UA'; 
            recognition.onresult = (e) => { 
                document.getElementById('searchInput').value = e.results[0][0].transcript; 
                applyFilters(); 
            }; 
        }
        function startVoiceSearch() { if(recognition) recognition.start(); else alert('Голосовий пошук не підтримується'); }
        
        let allProducts = [], filtered = [], currentPage = 1, itemsPerPage = 24;
        
        function applyFilters() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            let vendor = document.getElementById('vendorSelect').value;
            let category = document.getElementById('categorySelect').value;
            let sort = document.getElementById('sortSelect').value;
            itemsPerPage = parseInt(document.getElementById('limitSelect').value);
            
            filtered = allProducts.filter(p => {
                if(vendor && p.vendorId !== vendor) return false;
                if(category && p.category !== category) return false;
                if(search && !`${p.gname || ''} ${p.code || ''} ${p.vendor || ''}`.toLowerCase().includes(search)) return false;
                return true;
            });
            
            if(sort === 'price-asc') filtered.sort((a,b) => (a.price || a.sprice || 0) - (b.price || b.sprice || 0));
            else if(sort === 'price-desc') filtered.sort((a,b) => (b.price || b.sprice || 0) - (a.price || a.sprice || 0));
            
            currentPage = 1;
            renderProducts();
            document.getElementById('statsText').innerHTML = `📊 ${filtered.length} товарів знайдено`;
        }
        
        function renderProducts() {
            let start = (currentPage-1) * itemsPerPage;
            let pageItems = filtered.slice(start, start + itemsPerPage);
            let grid = document.getElementById('productsGrid');
            
            if(filtered.length === 0) { 
                grid.innerHTML = '<div class="loading">😕 Товари не знайдено</div>'; 
                document.getElementById('pagination').style.display = 'none'; 
                return; 
            }
            
            grid.innerHTML = pageItems.map(p => { 
                let stock = getStock(p);
                let price = p.price || p.sprice || 0;
                let promo = p.promoRIC;
                let oldPrice = p.RRP_UAH || 0;
                let hasPromo = promo && promo < price;
                let stockClass = stock > 5 ? 'stock-high' : (stock > 0 ? 'stock-low' : 'stock-out');
                let stockText = stock > 0 ? `${stock} шт` : 'Немає';
                let imgUrl = (p.pic && p.pic !== 'null') ? p.pic : 'https://via.placeholder.com/200x200?text=📷';
                let productName = p.gname || p.name || p.code || 'Без назви';
                return `<div class="card" onclick="location.href='product.html?code=${p.code}'">
                    <div class="card-img"><img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/200x200?text=📷'"></div>
                    <div class="card-info">
                        <div class="vendor">${p.vendor || ''}</div>
                        <div class="title">${productName.substring(0, 60)}</div>
                        <div class="code">${p.code || ''}</div>
                        <div>${hasPromo ? `<span class="price-current">${promo.toFixed(2)}</span><span class="price-old">${price.toFixed(2)} ₴</span>` : `<span class="price-current">${price.toFixed(2)}</span>`}</div>
                        <div class="stock ${stockClass}">${stockText}</div>
                        <button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.code}','${productName.replace(/'/g,"\\'")}',${price})" ${stock===0?'disabled':''}>🛒 В кошик</button>
                    </div>
                </div>`;
            }).join('');
            
            let totalPages = Math.ceil(filtered.length / itemsPerPage);
            document.getElementById('pageInfo').innerHTML = `Сторінка ${currentPage} / ${totalPages || 1}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
            document.getElementById('pagination').style.display = 'flex';
        }
        
        function nextPage() { let total = Math.ceil(filtered.length / itemsPerPage); if(currentPage < total) { currentPage++; renderProducts(); window.scrollTo({top:0}); } }
        function prevPage() { if(currentPage > 1) { currentPage--; renderProducts(); window.scrollTo({top:0}); } }
        
        async function loadProducts() {
            try {
                let res = await fetch('erc_products.json');
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                let data = await res.json();
                allProducts = Array.isArray(data) ? data : (data.goods || []);
                console.log(`✅ Завантажено ${allProducts.length} товарів`);
                
                let vendors = new Map(), categories = new Set();
                allProducts.forEach(p => { 
                    if(p.vendorId && p.vendor) vendors.set(p.vendorId, p.vendor); 
                    if(p.category) categories.add(p.category); 
                });
                document.getElementById('vendorSelect').innerHTML = '<option value="">Всі вендори</option>' + 
                    Array.from(vendors.entries()).sort((a,b)=>a[1].localeCompare(b[1])).map(([id,name])=>`<option value="${id}">${name}</option>`).join('');
                document.getElementById('categorySelect').innerHTML = '<option value="">Всі категорії</option>' + 
                    Array.from(categories).sort().map(c=>`<option value="${c}">${c}</option>`).join('');
                applyFilters();
            } catch(e) { 
                console.error(e); 
                document.getElementById('productsGrid').innerHTML = `<div class="loading">❌ Помилка: ${e.message}<br>Перевірте файл erc_products.json</div>`; 
            }
        }
        
        document.getElementById('searchInput').addEventListener('input', () => setTimeout(applyFilters, 300));
        document.getElementById('vendorSelect').addEventListener('change', applyFilters);
        document.getElementById('categorySelect').addEventListener('change', applyFilters);
        document.getElementById('sortSelect').addEventListener('change', applyFilters);
        document.getElementById('limitSelect').addEventListener('change', () => { currentPage = 1; applyFilters(); });
        document.getElementById('prevPage').addEventListener('click', prevPage);
        document.getElementById('nextPage').addEventListener('click', nextPage);
        
        window.onscroll = function() { document.getElementById('toTopBtn').style.display = window.scrollY > 300 ? 'block' : 'none'; };
        document.getElementById('toTopBtn').onclick = () => window.scrollTo({top:0, behavior:'smooth'});
        
        updateAuthUI();
        loadProducts();
    </script>
</body>
</html>
