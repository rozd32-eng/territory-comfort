<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territory Comfort - Каталог товарів</title>
    <meta name="description" content="Понад 26 000 товарів з актуальними цінами та наявністю">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Всі стилі залишаються такими ж */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; padding: 20px; transition: all 0.3s; }
        body.dark { background: #1a1a2e; color: #eee; }
        body.dark .card, body.dark .filters, body.dark .stats-bar, body.dark .cart-content, body.dark .orders-content { background: #0f0f1a; color: #eee; border-color: #2a2a3e; }
        
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px 25px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo h1 { font-size: 24px; cursor: pointer; }
        .logo p { font-size: 11px; opacity: 0.8; }
        .cart-btn, .auth-btn, .theme-btn, .orders-btn { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 40px; cursor: pointer; border: none; color: white; display: inline-flex; align-items: center; gap: 5px; }
        .cart-count { background: #ff6b6b; border-radius: 20px; padding: 2px 8px; margin-left: 5px; }
        .contacts { display: flex; gap: 15px; font-size: 13px; }
        .profile-info { background: rgba(255,255,255,0.2); border-radius: 40px; padding: 5px 15px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        
        .filters { background: white; padding: 15px; border-radius: 16px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 2; min-width: 200px; position: relative; }
        .search-box input { width: 100%; padding: 10px 40px 10px 15px; border: 1px solid #ddd; border-radius: 40px; }
        .voice-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #667eea; }
        select { padding: 10px 15px; border: 1px solid #ddd; border-radius: 40px; background: white; cursor: pointer; }
        .stats-bar { background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 16px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-3px); }
        .card-img { height: 180px; display: flex; align-items: center; justify-content: center; padding: 15px; background: #f7fafc; }
        .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .promo-badge { position: absolute; top: 10px; left: 10px; background: linear-gradient(135deg, #f093fb, #f5576c); color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; z-index: 2; }
        .card-info { padding: 15px; }
        .vendor { color: #667eea; font-size: 12px; margin-bottom: 5px; }
        .title { font-size: 14px; font-weight: 600; margin-bottom: 8px; min-height: 40px; line-height: 1.3; }
        .code { font-size: 11px; color: #999; margin-bottom: 8px; }
        .price-current { font-size: 20px; font-weight: 700; color: #48bb78; }
        .price-current:after { content: ' ₴'; }
        .price-old { font-size: 13px; color: #999; text-decoration: line-through; margin-left: 8px; }
        .stock { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; margin: 10px 0; }
        .stock-high { background: #48bb78; color: white; }
        .stock-low { background: #ed8936; color: white; }
        .stock-out { background: #fc8181; color: white; }
        .add-btn { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .pagination button { padding: 8px 20px; background: #667eea; color: white; border: none; border-radius: 30px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; }
        
        .cart-modal, .orders-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .cart-content, .orders-content { background: white; border-radius: 20px; max-width: 1000px; width: 95%; max-height: 90vh; overflow-y: auto; padding: 25px; position: relative; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #ddd; gap: 15px; flex-wrap: wrap; }
        .cart-item-info { flex: 3; min-width: 200px; }
        .cart-item-title { font-weight: 600; margin-bottom: 5px; word-break: break-word; font-size: 14px; line-height: 1.4; }
        .cart-item-price { color: #48bb78; font-size: 14px; font-weight: 600; }
        .cart-item-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .cart-item-actions button { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-minus { background: #fc8181; color: white; }
        .btn-plus { background: #48bb78; color: white; }
        .btn-remove { background: #666; color: white; width: auto !important; border-radius: 20px !important; padding: 0 15px; }
        .cart-item-qty-input { width: 60px; height: 36px; text-align: center; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; }
        .cart-total { margin-top: 20px; padding-top: 15px; border-top: 2px solid #ddd; text-align: right; font-size: 24px; font-weight: bold; }
        .cart-buttons { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .cart-buttons button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; min-width: 140px; }
        .btn-checkout { background: #48bb78; color: white; }
        .btn-clear { background: #fc8181; color: white; }
        .btn-close { background: #667eea; color: white; }
        
        .orders-list { display: flex; flex-direction: column; gap: 20px; }
        .order-card { border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .order-date { color: #666; font-size: 14px; }
        .order-total { font-weight: bold; color: #48bb78; font-size: 18px; }
        .order-items { margin-top: 10px; }
        .order-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
        
        footer { text-align: center; padding: 20px; color: #999; margin-top: 30px; border-top: 1px solid #ddd; }
        .footer-contacts { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
        .footer-contacts a { color: #667eea; text-decoration: none; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #48bb78; color: white; padding: 10px 20px; border-radius: 10px; z-index: 1100; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading { text-align: center; padding: 50px; color: #666; }
        .to-top { position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; background: #667eea; color: white; border: none; border-radius: 50%; cursor: pointer; display: none; z-index: 1000; }
        @media (max-width: 640px) { .products-grid { grid-template-columns: 1fr; } .filters { flex-direction: column; } .contacts { display: none; } .cart-item { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
    <!-- Вміст такий самий, як у попередній версії -->
    <div class="header">
        <div class="logo" onclick="location.reload()"><h1>🛒 Territory Comfort</h1><p>Актуальні ціни та наявність</p></div>
        <div class="contacts"><span>📞 +38 (073) 044-5800</span><span>📞 +38 (098) 044-5800</span></div>
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <button class="theme-btn" onclick="toggleTheme()">🌙</button>
            <button class="cart-btn" onclick="openCart()">🛒 Кошик <span id="cartCount" class="cart-count">0</span></button>
            <div id="authContainer"></div>
        </div>
    </div>

    <!-- Решта коду така ж, як у попередньому index.html -->
    <!-- ... (всі фільтри, товари, модальні вікна) ... -->
    
    <script>
        // Весь JavaScript код залишається таким же, як у попередній версії
        // ... (авторизація, кошик, checkout тощо)
        
        // Додамо відстеження подій для Analytics
        function trackEvent(category, action, label) {
            if (typeof gtag !== 'undefined') {
                gtag('event', action, {
                    event_category: category,
                    event_label: label
                });
            }
        }
        
        // Відстеження пошуку
        const originalApplyFilters = applyFilters;
        window.applyFilters = function() {
            const searchTerm = document.getElementById('searchInput').value;
            if (searchTerm && searchTerm.length > 2) {
                trackEvent('search', 'query', searchTerm);
            }
            return originalApplyFilters();
        };
        
        // Відстеження додавання в кошик
        const originalAddToCart = addToCart;
        window.addToCart = function(code, name, price) {
            trackEvent('ecommerce', 'add_to_cart', `${code} - ${name.substring(0, 30)}`);
            return originalAddToCart(code, name, price);
        };
        
        // Відстеження оформлення замовлення
        const originalCheckout = checkout;
        window.checkout = function() {
            const total = Object.values(cart).reduce((s,i) => s + i.price * i.qty, 0);
            trackEvent('ecommerce', 'checkout', `total: ${total.toFixed(2)} ₴`);
            return originalCheckout();
        };
    </script>
</body>
</html>
