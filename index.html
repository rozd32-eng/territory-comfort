<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERC Shop - Каталог товарів</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-light: #666;
            --border: #e2e8f0;
            --primary: #667eea;
            --success: #48bb78;
            --danger: #fc8181;
            --warning: #ed8936;
        }

        body.dark {
            --bg: #1a1a2e;
            --card: #0f0f1a;
            --text: #eee;
            --text-light: #94a3b8;
            --border: #2a2a3e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            transition: all 0.3s;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            font-size: 24px;
        }

        .logo p {
            font-size: 11px;
            opacity: 0.8;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .theme-btn,
        .cart-btn {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 40px;
            cursor: pointer;
            border: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-count {
            background: #ff6b6b;
            border-radius: 20px;
            padding: 2px 8px;
        }

        .filters {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid var(--border);
        }

        .search-box {
            flex: 2;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid var(--border);
            border-radius: 40px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }

        .voice-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary);
            font-size: 18px;
        }

        select {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            min-width: 160px;
        }

        .stats-bar {
            background: var(--card);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid var(--border);
        }

        .right-controls {
            display: flex;
            gap: 10px;
        }

        .sort-select,
        .limit-select {
            padding: 8px 15px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            position: relative;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .card-img {
            height: 180px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .card-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .promo-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
        }

        .card-info {
            padding: 15px;
        }

        .vendor {
            color: var(--primary);
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            height: 36px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
        }

        .code {
            font-size: 10px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .price-current {
            font-size: 20px;
            font-weight: 700;
            color: var(--success);
        }

        .price-current:after {
            content: ' ₴';
        }

        .price-old {
            font-size: 13px;
            color: var(--text-light);
            text-decoration: line-through;
            margin-left: 8px;
        }

        .stock {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin: 10px 0;
        }

        .stock-high {
            background: var(--success);
            color: white;
        }

        .stock-low {
            background: var(--warning);
            color: white;
        }

        .stock-out {
            background: var(--danger);
            color: white;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
        }

        .pagination button {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background: var(--card);
            border-radius: 20px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }

        .cart-item-actions button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            margin: 0 2px;
        }

        .delivery-section,
        .promo-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .delivery-cost {
            background: var(--bg);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-light);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            font-size: 12px;
            margin-top: 30px;
            border-top: 1px solid var(--border);
        }

        .to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 1000;
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            select {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <h1>🛒 ERC Shop</h1>
            <p>Актуальні ціни та наявність</p>
        </div>
        <div class="header-actions">
            <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="cart-btn" onclick="openCart()"><i class="fas fa-shopping-cart"></i> Кошик <span
                    id="cartCount" class="cart-count">0</span></button>
        </div>
    </div>

    <div class="filters">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Пошук товарів...">
            <button class="voice-btn" onclick="startVoiceSearch()"><i class="fas fa-microphone"></i></button>
        </div>
        <select id="vendorSelect">
            <option value="">Всі вендори</option>
        </select>
        <select id="categorySelect">
            <option value="">Всі категорії</option>
        </select>
        <select id="promoSelect">
            <option value="all">Всі товари</option>
            <option value="promo">🔥 Акційні</option>
            <option value="stock">✅ В наявності</option>
        </select>
        <select id="sortSelect">
            <option value="default">За замовчуванням</option>
            <option value="price-asc">Ціна ↑</option>
            <option value="price-desc">Ціна ↓</option>
            <option value="name-asc">Назва А-Я</option>
        </select>
        <select id="limitSelect">
            <option value="24">24</option>
            <option value="48">48</option>
            <option value="96">96</option>
        </select>
    </div>

    <div class="stats-bar">
        <div id="statsText">📊 Завантаження...</div>
    </div>

    <div class="products-grid" id="productsGrid">
        <div class="loading">⏳ Завантаження...</div>
    </div>
    <div class="pagination" id="pagination"><button id="prevPage" disabled>◀ Назад</button><span id="pageInfo">Сторінка
            1</span><button id="nextPage">Вперед ▶</button></div>

    <footer>© 2025 ERC Shop | Дані оновлюються автоматично</footer>
    <button class="to-top" id="toTopBtn"><i class="fas fa-arrow-up"></i></button>

    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <button onclick="closeCart()"
                style="float:right;font-size:24px;background:none;border:none">&times;</button>
            <h3>🛒 Кошик</h3>
            <div id="cartList"></div>
            <div id="cartTotal"></div>
            <div class="delivery-section">
                <strong>🚚 Доставка</strong>
                <select id="citySelect">
                    <option value="">Оберіть місто</option>
                    <option value="Київ">Київ</option>
                    <option value="Львів">Львів</option>
                    <option value="Одеса">Одеса</option>
                    <option value="Дніпро">Дніпро</option>
                    <option value="Харків">Харків</option>
                </select>
                <div id="deliveryCost" class="delivery-cost"></div>
            </div>
            <div class="promo-section">
                <strong>🏷 Промокод</strong>
                <input type="text" id="promoCode" placeholder="WELCOME10, ERC20, SUMMER15">
                <button onclick="applyPromo()">Застосувати</button>
                <div id="promoInfo" style="font-size:12px;margin-top:5px"></div>
            </div>
            <button onclick="clearCart()"
                style="width:100%;padding:10px;background:var(--danger);color:white;border:none;border-radius:10px;margin-top:15px">Очистити</button>
            <button onclick="checkout()"
                style="width:100%;padding:10px;background:var(--success);color:white;border:none;border-radius:10px;margin-top:10px">💳
                Оформити</button>
        </div>
    </div>

    <script>
        // Конфігурація Telegram
        const TELEGRAM_BOT_TOKEN = '8620493037:AAEhpB19nqTnqLe68ndlV9TPTnEgBq1FZQc';
        const TELEGRAM_CHAT_ID = '506201498';

        let allProducts = [], filtered = [], currentPage = 1, itemsPerPage = 24;
        let cart = JSON.parse(localStorage.getItem('erc_cart') || '{}');
        let orders = JSON.parse(localStorage.getItem('erc_orders') || '[]');
        let searches = JSON.parse(localStorage.getItem('erc_searches') || '[]');
        let discount = JSON.parse(localStorage.getItem('erc_discount') || '{"percent":0}');
        let recognition = null;

        function getStock(p) {
            try {
                let w = p.whs?.find(w => w.id === 1);
                if (w && w.q) {
                    let num = parseInt(String(w.q).replace(/[^0-9]/g, ''));
                    return isNaN(num) ? 0 : num;
                }
                return 0;
            } catch (e) { return 0; }
        }

        function getPrice(p) { return p.sprice || 0; }
        function isPromo(p) { return p.sprice > 0 && p.RRP_UAH > 0 && p.sprice < p.RRP_UAH; }
        function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerHTML = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

        // Telegram сповіщення
        async function sendTelegramNotification(order) {
            const itemsList = order.items.map(i => `• ${(i.name || 'Товар').substring(0, 35)} x${i.qty} = ${((i.price || 0) * i.qty).toFixed(2)} ₴`).join('\n');
            const message = `🛒 **НОВЕ ЗАМОВЛЕННЯ!**\n\n👤 ${order.customer}\n📞 ${order.phone}\n💰 ${order.total} ₴\n📦 ${order.items.reduce((s, i) => s + i.qty, 0)} шт\n\n📋 **Деталі:**\n${itemsList}`;
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
                console.log('✅ Telegram сповіщення відправлено');
            } catch (e) { console.error('Telegram помилка:', e); }
        }

        function saveCart() {
            localStorage.setItem('erc_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            let c = Object.values(cart).reduce((s, i) => s + (i.qty || 0), 0);
            document.getElementById('cartCount').textContent = c;
            renderCart();
        }

        function addToCart(code, name, price) {
            let finalPrice = parseFloat(price);
            if (isNaN(finalPrice)) finalPrice = 0;
            if (cart[code]) {
                cart[code].qty += 1;
            } else {
                cart[code] = {
                    name: (name || code).substring(0, 40),
                    price: finalPrice,
                    qty: 1
                };
            }
            saveCart();
            showToast(`✅ Додано до кошика (${finalPrice.toFixed(2)} ₴)`);
        }

        function removeFromCart(code) {
            delete cart[code];
            saveCart();
            showToast('🗑 Видалено');
        }

        function updateQty(code, delta) {
            if (cart[code]) {
                let n = (cart[code].qty || 0) + delta;
                if (n <= 0) delete cart[code];
                else cart[code].qty = n;
                saveCart();
            }
        }

        function clearCart() {
            cart = {};
            discount = { percent: 0 };
            localStorage.setItem('erc_discount', JSON.stringify(discount));
            saveCart();
            showToast('Кошик очищено');
        }

        function openCart() {
            document.getElementById('cartModal').style.display = 'flex';
            renderCart();
            calculateDelivery();
        }

        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function renderCart() {
            let container = document.getElementById('cartList');
            let items = Object.entries(cart);
            if (items.length === 0) {
                container.innerHTML = '<div style="padding:30px;text-align:center">🛒 Кошик порожній</div>';
                document.getElementById('cartTotal').innerHTML = '';
                return;
            }

            container.innerHTML = items.map(([code, item]) => {
                let price = item.price || 0;
                let qty = item.qty || 0;
                let name = item.name || code;
                let total = price * qty;
                return `<div class="cart-item">
                    <div><strong>${name}</strong><br>${price.toFixed(2)} ₴ × ${qty} = ${total.toFixed(2)} ₴</div>
                    <div class="cart-item-actions">
                        <button onclick="updateQty('${code}',-1)" style="background:#fc8181;color:white;">-</button>
                        ${qty}
                        <button onclick="updateQty('${code}',1)" style="background:#48bb78;color:white;">+</button>
                        <button onclick="removeFromCart('${code}')" style="background:#666;color:white;">🗑</button>
                    </div>
                </div>`;
            }).join('');

            let subtotal = Object.values(cart).reduce((s, i) => s + (i.price || 0) * (i.qty || 0), 0);
            let total = discount.percent > 0 ? subtotal * (1 - discount.percent / 100) : subtotal;
            document.getElementById('cartTotal').innerHTML = `<strong>Сума: ${total.toFixed(2)} ₴</strong>${discount.percent > 0 ? `<br><span style="color:#48bb78">Знижка ${discount.percent}%</span>` : ''}`;
        }

        function calculateDelivery() {
            let city = document.getElementById('citySelect')?.value;
            if (!city || Object.keys(cart).length === 0) {
                document.getElementById('deliveryCost').style.display = 'none';
                return;
            }
            let weight = Object.values(cart).reduce((s, i) => s + 0.5 * (i.qty || 0), 0);
            let cityCost = { 'Київ': 0, 'Львів': 20, 'Одеса': 25, 'Дніпро': 15, 'Харків': 20 };
            let cost = 50 + weight * 10 + (cityCost[city] || 30);
            document.getElementById('deliveryCost').innerHTML = `🚚 Доставка до ${city}: ${cost.toFixed(2)} ₴<br>📦 Вага: ${weight.toFixed(1)} кг`;
            document.getElementById('deliveryCost').style.display = 'block';
        }

        const promoCodes = { 'WELCOME10': 10, 'ERC20': 20, 'SUMMER15': 15 };
        function applyPromo() {
            let code = document.getElementById('promoCode').value.trim().toUpperCase();
            if (promoCodes[code]) {
                discount = { percent: promoCodes[code] };
                localStorage.setItem('erc_discount', JSON.stringify(discount));
                document.getElementById('promoInfo').innerHTML = `✅ Знижка ${discount.percent}%`;
                showToast(`Знижка ${discount.percent}%`);
                renderCart();
            } else {
                showToast('❌ Невірний промокод');
            }
            document.getElementById('promoCode').value = '';
        }

        function checkout() {
            if (Object.keys(cart).length === 0) {
                showToast('❌ Кошик порожній');
                return;
            }
            let customer = prompt('Ваше ім\'я:', 'Гість') || 'Гість';
            let phone = prompt('Телефон:', '+380') || '+380';
            let subtotal = Object.values(cart).reduce((s, i) => s + (i.price || 0) * (i.qty || 0), 0);
            let city = document.getElementById('citySelect')?.value;
            let cityCost = { 'Київ': 0, 'Львів': 20, 'Одеса': 25, 'Дніпро': 15, 'Харків': 20 };
            let delivery = city ? 50 + Object.values(cart).reduce((s, i) => s + 0.5 * (i.qty || 0), 0) * 10 + (cityCost[city] || 30) : 0;
            let total = discount.percent > 0 ? (subtotal + delivery) * (1 - discount.percent / 100) : subtotal + delivery;
            let order = {
                id: Date.now(),
                date: new Date().toISOString(),
                items: Object.values(cart).map(i => ({ name: i.name, price: i.price, qty: i.qty })),
                total: total.toFixed(2),
                customer,
                phone,
                delivery: city || 'не вибрана'
            };
            orders.unshift(order);
            if (orders.length > 100) orders.pop();
            localStorage.setItem('erc_orders', JSON.stringify(orders));
            sendTelegramNotification(order);
            showToast(`✅ Замовлення на ${total.toFixed(2)} ₴ прийнято!`);
            clearCart();
            closeCart();
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'uk-UA';
            recognition.onresult = (e) => {
                document.getElementById('searchInput').value = e.results[0][0].transcript;
                applyFilters();
            };
        }
        function startVoiceSearch() {
            if (recognition) recognition.start();
            else alert('Голосовий пошук не підтримується');
        }

        function applyFilters() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            if (search && search.length > 2) {
                searches.push({ term: search, date: new Date().toISOString() });
                if (searches.length > 500) searches.shift();
                localStorage.setItem('erc_searches', JSON.stringify(searches));
            }
            let vendor = document.getElementById('vendorSelect').value;
            let category = document.getElementById('categorySelect').value;
            let promoType = document.getElementById('promoSelect').value;
            let sort = document.getElementById('sortSelect').value;
            itemsPerPage = parseInt(document.getElementById('limitSelect').value);

            filtered = allProducts.filter(p => {
                if (vendor && p.vendorId !== vendor) return false;
                if (category && p.category !== category) return false;
                if (promoType === 'promo' && !isPromo(p)) return false;
                if (promoType === 'stock' && getStock(p) <= 0) return false;
                if (search && !`${p.gname || ''} ${p.code || ''} ${p.vendor || ''}`.toLowerCase().includes(search)) return false;
                return true;
            });

            if (sort === 'price-asc') filtered.sort((a, b) => getPrice(a) - getPrice(b));
            else if (sort === 'price-desc') filtered.sort((a, b) => getPrice(b) - getPrice(a));
            else if (sort === 'name-asc') filtered.sort((a, b) => (a.gname || '').localeCompare(b.gname || '', 'uk'));

            currentPage = 1;
            renderProducts();
            updateStats();
        }

        function renderProducts() {
            let start = (currentPage - 1) * itemsPerPage;
            let pageItems = filtered.slice(start, start + itemsPerPage);
            let grid = document.getElementById('productsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="loading">😕 Товари не знайдено</div>';
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            grid.innerHTML = pageItems.map(p => {
                let stock = getStock(p), price = getPrice(p), promo = isPromo(p);
                let stockClass = stock > 5 ? 'stock-high' : (stock > 0 ? 'stock-low' : 'stock-out');
                let stockText = stock > 0 ? `${stock} шт` : 'Немає';
                let imgUrl = (p.pic && p.pic !== 'null') ? p.pic : 'https://via.placeholder.com/200x200?text=📷';
                let safeName = (p.gname || p.code || '').replace(/'/g, "\\'");
                let safeCode = (p.code || '').replace(/'/g, "\\'");
                return `<div class="card" onclick="window.location.href='product.html?code=${safeCode}'">
                    ${promo ? '<div class="promo-badge">🔥 Акція</div>' : ''}
                    <div class="card-img"><img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/200x200?text=📷'"></div>
                    <div class="card-info">
                        <div class="vendor">${p.vendor || ''}</div>
                        <div class="title">${(p.gname || p.code || '').substring(0, 60)}</div>
                        <div class="code">${p.code || ''}</div>
                        <div><span class="price-current">${price.toFixed(2)}</span>${promo && p.RRP_UAH ? `<span class="price-old">${p.RRP_UAH.toFixed(2)} ₴</span>` : ''}</div>
                        <div class="stock ${stockClass}">${stockText}</div>
                        <button class="add-btn" onclick="event.stopPropagation(); addToCart('${safeCode}', '${safeName}', ${price})" ${stock === 0 ? 'disabled' : ''}>🛒 В кошик</button>
                    </div>
                </div>`;
            }).join('');

            let totalPages = Math.ceil(filtered.length / itemsPerPage);
            document.getElementById('pageInfo').textContent = `Сторінка ${currentPage} / ${totalPages || 1}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
            document.getElementById('pagination').style.display = 'flex';
        }

        function updateStats() {
            document.getElementById('statsText').innerHTML = `📊 ${filtered.length} товарів знайдено`;
        }

        function nextPage() {
            let total = Math.ceil(filtered.length / itemsPerPage);
            if (currentPage < total) {
                currentPage++;
                renderProducts();
                window.scrollTo({ top: 0 });
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderProducts();
                window.scrollTo({ top: 0 });
            }
        }

        async function loadProducts() {
            try {
                let res = await fetch('erc_products.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                let data = await res.json();
                allProducts = Array.isArray(data) ? data : (data.goods || []);
                console.log(`✅ Завантажено ${allProducts.length} товарів`);

                let vendors = new Map(), categories = new Set();
                allProducts.forEach(p => {
                    if (p.vendorId && p.vendor) vendors.set(p.vendorId, p.vendor);
                    if (p.category) categories.add(p.category);
                });
                document.getElementById('vendorSelect').innerHTML = '<option value="">📦 Всі вендори</option>' +
                    Array.from(vendors.entries()).sort((a, b) => a[1].localeCompare(b[1])).map(([id, name]) => `<option value="${id}">${name}</option>`).join('');
                document.getElementById('categorySelect').innerHTML = '<option value="">📁 Всі категорії</option>' +
                    Array.from(categories).sort().map(c => `<option value="${c}">${c}</option>`).join('');
                applyFilters();
            } catch (e) {
                console.error(e);
                document.getElementById('productsGrid').innerHTML = '<div class="loading">❌ Помилка завантаження даних</div>';
            }
        }

        document.getElementById('searchInput').addEventListener('input', () => setTimeout(applyFilters, 300));
        document.getElementById('vendorSelect').addEventListener('change', applyFilters);
        document.getElementById('categorySelect').addEventListener('change', applyFilters);
        document.getElementById('promoSelect').addEventListener('change', applyFilters);
        document.getElementById('sortSelect').addEventListener('change', applyFilters);
        document.getElementById('limitSelect').addEventListener('change', () => { currentPage = 1; applyFilters(); });
        document.getElementById('prevPage').addEventListener('click', prevPage);
        document.getElementById('nextPage').addEventListener('click', nextPage);
        document.getElementById('citySelect').addEventListener('change', calculateDelivery);

        window.onscroll = function () {
            document.getElementById('toTopBtn').style.display = window.scrollY > 300 ? 'block' : 'none';
        };
        document.getElementById('toTopBtn').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        // Очистити можливі пошкоджені дані в кошику
        for (let code in cart) {
            if (cart[code].price === undefined || isNaN(cart[code].price)) {
                cart[code].price = 0;
            }
            if (cart[code].qty === undefined) {
                cart[code].qty = 1;
            }
        }

        updateCartUI();
        loadProducts();
    </script>
</body>

</html>
