<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territory Comfort - Каталог</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px 25px; border-radius: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo h1 { font-size: 24px; cursor: pointer; }
        .contacts { display: flex; gap: 15px; font-size: 13px; }
        .cart-btn { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 40px; cursor: pointer; border: none; color: white; }
        .filters { background: white; padding: 15px; border-radius: 16px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-box { flex: 2; min-width: 200px; }
        .search-box input { width: 100%; padding: 10px 15px; border: 1px solid #ddd; border-radius: 40px; }
        select { padding: 10px 15px; border: 1px solid #ddd; border-radius: 40px; background: white; }
        .stats-bar { background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 16px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-3px); }
        .card-img { height: 180px; display: flex; align-items: center; justify-content: center; padding: 15px; background: #f7fafc; }
        .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 15px; }
        .vendor { color: #667eea; font-size: 12px; margin-bottom: 5px; }
        .title { font-size: 14px; font-weight: 600; margin-bottom: 8px; min-height: 40px; }
        .code { font-size: 11px; color: #999; margin-bottom: 8px; }
        .price-current { font-size: 20px; font-weight: 700; color: #48bb78; }
        .price-current:after { content: ' ₴'; }
        .stock { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; margin: 10px 0; }
        .stock-yes { background: #48bb78; color: white; }
        .stock-no { background: #fc8181; color: white; }
        .add-btn { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .pagination button { padding: 8px 20px; background: #667eea; color: white; border: none; border-radius: 30px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; }
        footer { text-align: center; padding: 20px; color: #999; margin-top: 30px; border-top: 1px solid #ddd; }
        .footer-contacts { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #48bb78; color: white; padding: 10px 20px; border-radius: 10px; z-index: 1100; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading { text-align: center; padding: 50px; color: #666; }
        @media (max-width: 640px) { .products-grid { grid-template-columns: 1fr; } .filters { flex-direction: column; } .contacts { display: none; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="location.reload()"><h1>🛒 Territory Comfort</h1><p>Інструменти та техніка</p></div>
        <div class="contacts"><span>📞 +38 (073) 044-5800</span><span>📞 +38 (098) 044-5800</span></div>
        <button class="cart-btn" onclick="openCart()">🛒 Кошик <span id="cartCount" class="cart-count">0</span></button>
    </div>

    <div class="filters">
        <div class="search-box"><input type="text" id="searchInput" placeholder="Пошук товарів..."></div>
        <select id="vendorSelect"><option value="">Всі бренди</option></select>
        <select id="categorySelect"><option value="">Всі категорії</option></select>
        <select id="sortSelect">
            <option value="default">За замовчуванням</option>
            <option value="price-asc">Ціна ↑</option>
            <option value="price-desc">Ціна ↓</option>
        </select>
    </div>

    <div class="stats-bar"><div id="statsText">📊 Завантаження...</div></div>

    <div class="products-grid" id="productsGrid"><div class="loading">⏳ Завантаження товарів...</div></div>
    <div class="pagination" id="pagination"><button id="prevPage" disabled>◀ Назад</button><span id="pageInfo">Сторінка 1</span><button id="nextPage">Вперед ▶</button></div>

    <footer>
        <div class="footer-contacts">
            <a href="#">📞 +38 (073) 044-5800</a>
            <a href="#">📞 +38 (098) 044-5800</a>
            <a href="#">📍 Київ</a>
            <a href="#">📦 Доставка</a>
            <a href="#">💳 Оплата</a>
            <a href="#">📧 Контакти</a>
        </div>
        <p>© 2025 Territory Comfort | Всі права захищено</p>
    </footer>

    <div id="cartModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; border-radius:20px; max-width:500px; width:90%; padding:20px;">
            <button onclick="closeCart()" style="float:right; font-size:24px; background:none; border:none; cursor:pointer">&times;</button>
            <h3>🛒 Кошик</h3>
            <div id="cartList"></div>
            <div id="cartTotal"></div>
            <button onclick="clearCart()" style="width:100%; padding:10px; background:#fc8181; color:white; border:none; border-radius:10px; margin-top:10px">Очистити</button>
            <button onclick="checkout()" style="width:100%; padding:10px; background:#48bb78; color:white; border:none; border-radius:10px; margin-top:10px">Оформити</button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('territory_cart') || '{}');
        
        function updateCartUI() { 
            let c = Object.values(cart).reduce((s,i)=>s+(i.qty||0),0); 
            document.getElementById('cartCount').textContent = c; 
            renderCart();
        }
        
        function saveCart() { 
            localStorage.setItem('territory_cart', JSON.stringify(cart)); 
            updateCartUI(); 
        }
        
        function addToCart(code, name, price) {
            if(cart[code]) cart[code].qty += 1;
            else cart[code] = { name: name.substring(0, 60), price: parseFloat(price), qty: 1 };
            saveCart();
            showToast(`✅ Додано (${price.toFixed(2)} ₴)`);
        }
        
        function removeFromCart(code) {
            delete cart[code];
            saveCart();
            showToast('🗑 Видалено');
        }
        
        function updateQty(code, delta) {
            if(cart[code]) {
                let newQty = cart[code].qty + delta;
                if(newQty <= 0) delete cart[code];
                else cart[code].qty = newQty;
                saveCart();
            }
        }
        
        function clearCart() {
            if(confirm('Очистити кошик?')) {
                cart = {};
                saveCart();
                showToast('Кошик очищено');
                closeCart();
            }
        }
        
        function openCart() {
            renderCart();
            document.getElementById('cartModal').style.display = 'flex';
        }
        
        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }
        
        function renderCart() {
            let items = Object.entries(cart);
            let container = document.getElementById('cartList');
            if(items.length === 0) {
                container.innerHTML = '<div style="padding:30px;text-align:center">Кошик порожній</div>';
                document.getElementById('cartTotal').innerHTML = '';
                return;
            }
            let total = 0;
            container.innerHTML = items.map(([code, item]) => {
                total += item.price * item.qty;
                return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #ddd;">
                    <div><strong>${item.name}</strong><br>${item.price.toFixed(2)} ₴ × ${item.qty} = ${(item.price*item.qty).toFixed(2)} ₴</div>
                    <div><button onclick="updateQty('${code}',-1)" style="background:#fc8181; color:white; border:none; width:28px; height:28px; border-radius:50%">-</button> ${item.qty} <button onclick="updateQty('${code}',1)" style="background:#48bb78; color:white; border:none; width:28px; height:28px; border-radius:50%">+</button> <button onclick="removeFromCart('${code}')" style="background:#666; color:white; border:none; width:28px; height:28px; border-radius:50%">🗑</button></div>
                </div>`;
            }).join('');
            document.getElementById('cartTotal').innerHTML = `<strong>Загалом: ${total.toFixed(2)} ₴</strong>`;
        }
        
        function checkout() {
            if(Object.keys(cart).length === 0) { alert('Кошик порожній'); return; }
            let total = Object.values(cart).reduce((s,i)=>s + i.price * i.qty, 0);
            let itemsList = Object.values(cart).map(i => `${i.name} x${i.qty} = ${(i.price*i.qty).toFixed(2)} ₴`).join('\n');
            if(confirm(`Ваше замовлення:\n\n${itemsList}\n\n💰 Загалом: ${total.toFixed(2)} ₴\n\nОформити?`)) {
                let customer = prompt('Ваше ім\'я:', 'Гість');
                let phone = prompt('Телефон:', '+380');
                alert(`✅ Замовлення прийнято! Найближчим часом зв'яжуться.`);
                cart = {};
                saveCart();
                closeCart();
            }
        }
        
        function showToast(msg) {
            let t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
        
        function getStock(p) {
            try {
                let w = p.whs?.find(w => w.id === 1);
                if(w && w.q) return parseInt(String(w.q).replace(/[^0-9]/g, '')) || 0;
                return 0;
            } catch(e) { return 0; }
        }
        
        let allProducts = [], filtered = [], currentPage = 1, itemsPerPage = 24;
        
        function applyFilters() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            let vendor = document.getElementById('vendorSelect').value;
            let category = document.getElementById('categorySelect').value;
            let sort = document.getElementById('sortSelect').value;
            
            filtered = allProducts.filter(p => {
                if(vendor && p.vendorId !== vendor) return false;
                if(category && p.category !== category) return false;
                if(search && !`${p.gname || ''} ${p.code || ''} ${p.vendor || ''}`.toLowerCase().includes(search)) return false;
                return true;
            });
            
            if(sort === 'price-asc') filtered.sort((a,b) => (a.price || a.sprice || 0) - (b.price || b.sprice || 0));
            if(sort === 'price-desc') filtered.sort((a,b) => (b.price || b.sprice || 0) - (a.price || a.sprice || 0));
            
            currentPage = 1;
            renderProducts();
            document.getElementById('statsText').innerHTML = `📊 ${filtered.length} товарів знайдено`;
        }
        
        function renderProducts() {
            let start = (currentPage-1) * itemsPerPage;
            let pageItems = filtered.slice(start, start + itemsPerPage);
            let grid = document.getElementById('productsGrid');
            
            if(filtered.length === 0) {
                grid.innerHTML = '<div class="loading">😕 Товари не знайдено</div>';
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            
            grid.innerHTML = pageItems.map(p => {
                let stock = getStock(p);
                let price = p.price || p.sprice || 0;
                let stockClass = stock > 0 ? 'stock-yes' : 'stock-no';
                let stockText = stock > 0 ? `${stock} шт` : 'Немає';
                let imgUrl = (p.pic && p.pic !== 'null') ? p.pic : 'https://via.placeholder.com/200x200?text=📷';
                let productName = p.gname || p.name || p.code || 'Без назви';
                let safeName = productName.replace(/'/g, "\\'");
                return `
                    <div class="card" onclick="location.href='product.html?code=${p.code}'">
                        <div class="card-img"><img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/200x200?text=📷'"></div>
                        <div class="card-info">
                            <div class="vendor">${p.vendor || ''}</div>
                            <div class="title">${productName.substring(0, 60)}</div>
                            <div class="code">${p.code || ''}</div>
                            <div><span class="price-current">${price.toFixed(2)}</span></div>
                            <div class="stock ${stockClass}">${stockText}</div>
                            <button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.code}', '${safeName}', ${price})" ${stock === 0 ? 'disabled' : ''}>🛒 В кошик</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            let totalPages = Math.ceil(filtered.length / itemsPerPage);
            document.getElementById('pageInfo').innerHTML = `Сторінка ${currentPage} / ${totalPages || 1}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
            document.getElementById('pagination').style.display = 'flex';
        }
        
        function nextPage() {
            let total = Math.ceil(filtered.length / itemsPerPage);
            if(currentPage < total) {
                currentPage++;
                renderProducts();
                window.scrollTo({top:0});
            }
        }
        
        function prevPage() {
            if(currentPage > 1) {
                currentPage--;
                renderProducts();
                window.scrollTo({top:0});
            }
        }
        
        async function loadProducts() {
            try {
                let res = await fetch('erc_products.json');
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                let data = await res.json();
                allProducts = Array.isArray(data) ? data : (data.goods || []);
                console.log(`✅ Завантажено ${allProducts.length} товарів`);
                
                let vendors = new Map(), categories = new Set();
                allProducts.forEach(p => {
                    if(p.vendorId && p.vendor) vendors.set(p.vendorId, p.vendor);
                    if(p.category) categories.add(p.category);
                });
                document.getElementById('vendorSelect').innerHTML = '<option value="">Всі бренди</option>' + 
                    Array.from(vendors.entries()).sort((a,b)=>a[1].localeCompare(b[1])).map(([id,name])=>`<option value="${id}">${name}</option>`).join('');
                document.getElementById('categorySelect').innerHTML = '<option value="">Всі категорії</option>' + 
                    Array.from(categories).sort().map(c=>`<option value="${c}">${c}</option>`).join('');
                applyFilters();
            } catch(e) {
                console.error(e);
                document.getElementById('productsGrid').innerHTML = `<div class="loading">❌ Помилка: ${e.message}</div>`;
            }
        }
        
        document.getElementById('searchInput').addEventListener('input', () => setTimeout(applyFilters, 300));
        document.getElementById('vendorSelect').addEventListener('change', applyFilters);
        document.getElementById('categorySelect').addEventListener('change', applyFilters);
        document.getElementById('sortSelect').addEventListener('change', applyFilters);
        document.getElementById('prevPage').addEventListener('click', prevPage);
        document.getElementById('nextPage').addEventListener('click', nextPage);
        
        updateCartUI();
        loadProducts();
    </script>
</body>
</html>
