<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Territory Comfort - Тест</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .product { border-bottom: 1px solid #ddd; padding: 10px; margin: 5px 0; }
        .price { color: green; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🛒 Territory Comfort</h1>
    <div id="status">⏳ Перевірка завантаження...</div>
    <div id="products"></div>

    <script>
        async function testLoad() {
            const statusDiv = document.getElementById('status');
            const productsDiv = document.getElementById('products');
            
            try {
                statusDiv.innerHTML = '⏳ Завантаження файлу erc_products.json...';
                
                // Простий відносний шлях
                const response = await fetch('erc_products.json');
                
                statusDiv.innerHTML = `📊 Статус HTTP: ${response.status}`;
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - файл не знайдено`);
                }
                
                const data = await response.json();
                statusDiv.innerHTML = `✅ Тип даних: ${Array.isArray(data) ? 'масив' : 'об\'єкт'}`;
                
                let products = [];
                if (Array.isArray(data)) {
                    products = data;
                } else if (data.goods) {
                    products = data.goods;
                }
                
                statusDiv.innerHTML = `✅ Завантажено ${products.length} товарів!`;
                
                if (products.length === 0) {
                    productsDiv.innerHTML = '<p class="error">❌ Товари не знайдено</p>';
                    return;
                }
                
                // Показуємо перші 5 товарів
                let html = '<h2>Перші 5 товарів:</h2>';
                for (let i = 0; i < Math.min(products.length, 5); i++) {
                    const p = products[i];
                    html += `
                        <div class="product">
                            <strong>${p.vendor || 'Невідомий'}</strong><br>
                            📦 ${p.code || '—'}<br>
                            📝 ${(p.gname || 'Без назви').substring(0, 60)}<br>
                            💰 <span class="price">${(p.sprice || 0).toFixed(2)} ₴</span>
                        </div>
                    `;
                }
                productsDiv.innerHTML = html;
                
            } catch(error) {
                statusDiv.innerHTML = `<span class="error">❌ Помилка: ${error.message}</span>`;
                productsDiv.innerHTML = `<p class="error">Переконайтеся, що файл erc_products.json існує в репозиторії</p>`;
                console.error('Деталі:', error);
            }
        }
        
        testLoad();
    </script>
</body>
</html>
