<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territory Comfort - Товар</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; padding: 20px; }
        body.dark { background: #1a1a2e; color: #eee; }
        body.dark .product-card, body.dark .specs { background: #0f0f1a; color: #eee; border-color: #2a2a3e; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 10px; }
        .product-card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .product-img img { width: 100%; max-height: 400px; object-fit: contain; }
        .vendor { color: #667eea; font-size: 14px; margin-bottom: 10px; }
        h1 { font-size: 24px; margin-bottom: 10px; line-height: 1.3; }
        .code { color: #999; font-size: 12px; margin-bottom: 15px; }
        .price { font-size: 32px; font-weight: 700; color: #48bb78; margin: 15px 0; }
        .old-price { font-size: 18px; color: #999; text-decoration: line-through; margin-left: 10px; }
        .stock { display: inline-block; padding: 5px 15px; border-radius: 20px; margin: 15px 0; }
        .in-stock { background: #48bb78; color: white; }
        .low-stock { background: #ed8936; color: white; }
        .out-stock { background: #fc8181; color: white; }
        .preorder { background: #fbbf24; color: #333; }
        
        .quantity-selector { display: flex; align-items: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .quantity-selector label { font-weight: 600; }
        .quantity-control { display: flex; align-items: center; gap: 10px; }
        .quantity-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; font-weight: bold; }
        .quantity-btn.minus { background: #fc8181; color: white; }
        .quantity-btn.plus { background: #48bb78; color: white; }
        .quantity-input { width: 60px; height: 40px; text-align: center; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; }
        
        .buy-btn { padding: 15px 30px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; }
        .buy-btn.preorder-btn { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #333; }
        
        .specs { background: #f7fafc; border-radius: 16px; padding: 20px; margin-top: 20px; }
        .specs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 15px; }
        .loading { text-align: center; padding: 50px; }
        .error { text-align: center; padding: 50px; color: #fc8181; }
        .theme-btn { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: #667eea; color: white; border: none; border-radius: 50%; cursor: pointer; z-index: 100; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #48bb78; color: white; padding: 10px 20px; border-radius: 10px; z-index: 1100; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Назад до каталогу</a>
        <div id="productContent" class="loading">⏳ Завантаження...</div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <script>
        let currentProductData = null;
        let currentQuantity = 1;
        let maxStock = 0;
        let isPreorder = false;
        
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); }
        if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');
        
        function showToast(msg) { 
            let t = document.createElement('div'); 
            t.className = 'toast'; 
            t.innerHTML = msg; 
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 2000); 
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const productCode = urlParams.get('code');
        
        function updateQuantityDisplay() {
            const input = document.getElementById('quantityInput');
            if (input) input.value = currentQuantity;
            const minusBtn = document.querySelector('.quantity-btn.minus');
            if (minusBtn) minusBtn.disabled = currentQuantity <= 1;
            const plusBtn = document.querySelector('.quantity-btn.plus');
            if (plusBtn && maxStock > 0) plusBtn.disabled = currentQuantity >= maxStock;
        }
        
        function changeQuantity(delta) {
            let newQty = currentQuantity + delta;
            if (maxStock > 0) {
                if (newQty >= 1 && newQty <= maxStock) {
                    currentQuantity = newQty;
                    updateQuantityDisplay();
                }
            } else {
                // Для попереднього замовлення (немає обмежень)
                if (newQty >= 1) {
                    currentQuantity = newQty;
                    updateQuantityDisplay();
                }
            }
        }
        
        function setQuantity(value) {
            let qty = parseInt(value);
            if (isNaN(qty)) qty = 1;
            if (qty < 1) qty = 1;
            if (maxStock > 0 && qty > maxStock) qty = maxStock;
            currentQuantity = qty;
            updateQuantityDisplay();
        }
        
        function addToCart() {
            if (!currentProductData) {
                showToast('❌ Помилка: товар не знайдено');
                return;
            }
            
            const code = currentProductData.code;
            const price = currentProductData.price || currentProductData.sprice || 0;
            const name = (currentProductData.gname || currentProductData.name || currentProductData.code || 'Без назви').substring(0, 120);
            
            let cart = JSON.parse(localStorage.getItem('territory_cart') || '{}');
            
            if (cart[code]) {
                cart[code].qty += currentQuantity;
            } else {
                cart[code] = { name: name, price: parseFloat(price), qty: currentQuantity };
            }
            
            localStorage.setItem('territory_cart', JSON.stringify(cart));
            
            if (isPreorder) {
                showToast(`✅ Товар додано до попереднього замовлення (${currentQuantity} шт). Очікуйте повідомлення!`);
            } else {
                showToast(`✅ Додано ${currentQuantity} шт. на суму ${(price * currentQuantity).toFixed(2)} ₴`);
            }
        }
        
        async function loadProduct() {
            if (!productCode) {
                document.getElementById('productContent').innerHTML = '<div class="error">❌ Товар не знайдено</div>';
                return;
            }
            
            try {
                const res = await fetch('erc_products.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const products = Array.isArray(data) ? data : (data.goods || []);
                const product = products.find(p => p.code === productCode);
                
                if (!product) {
                    document.getElementById('productContent').innerHTML = `<div class="error">❌ Товар з кодом ${productCode} не знайдено</div>`;
                    return;
                }
                
                currentProductData = product;
                
                let stockNum = 0;
                if (product.whs && Array.isArray(product.whs)) {
                    const warehouse = product.whs.find(w => w.id === 1);
                    if (warehouse) stockNum = parseInt(String(warehouse.q).replace(/[^0-9]/g, '')) || 0;
                }
                maxStock = stockNum;
                currentQuantity = 1;
                
                // Визначаємо статус наявності
                let stockClass = '';
                let stockText = '';
                let isAvailable = false;
                
                if (stockNum > 5) {
                    stockClass = 'in-stock';
                    stockText = `${stockNum} шт`;
                    isAvailable = true;
                } else if (stockNum > 0) {
                    stockClass = 'low-stock';
                    stockText = `${stockNum} шт (мало)`;
                    isAvailable = true;
                } else {
                    stockClass = 'preorder';
                    stockText = 'Немає в наявності (під замовлення)';
                    isAvailable = false;
                    isPreorder = true;
                }
                
                const price = product.price || product.sprice || 0;
                const oldPrice = product.RRP_UAH || 0;
                const isPromo = oldPrice && price < oldPrice;
                const imgUrl = (product.pic && product.pic !== 'null') ? product.pic : 'https://via.placeholder.com/400x400?text=📷';
                const productName = product.gname || product.name || product.code || 'Без назви';
                
                document.getElementById('productContent').innerHTML = `
                    <div class="product-card">
                        <div class="product-grid">
                            <div class="product-img"><img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/400x400?text=📷'"></div>
                            <div>
                                <div class="vendor">🏢 ${product.vendor || 'Невідомий вендор'}</div>
                                <h1>${productName.substring(0, 150)}</h1>
                                <div class="code">📋 Код: ${product.code}</div>
                                <div class="price">${price.toFixed(2)} ₴${isPromo ? `<span class="old-price">${oldPrice.toFixed(2)} ₴</span>` : ''}</div>
                                <div class="stock ${stockClass}">📦 ${stockText}</div>
                                
                                <div class="quantity-selector">
                                    <label>Кількість:</label>
                                    <div class="quantity-control">
                                        <button class="quantity-btn minus" id="minusBtn">−</button>
                                        <input type="number" id="quantityInput" class="quantity-input" value="1" min="1" ${maxStock > 0 ? `max="${maxStock}"` : ''}>
                                        <button class="quantity-btn plus" id="plusBtn">+</button>
                                    </div>
                                    ${maxStock > 0 ? `<span style="color:#666; font-size:14px;">Доступно: ${maxStock} шт</span>` : '<span style="color:#fbbf24; font-size:14px;">🚚 Під замовлення (термін доставки 7-14 днів)</span>'}
                                </div>
                                
                                <button class="buy-btn ${stockNum === 0 ? 'preorder-btn' : ''}" id="buyBtn">${stockNum === 0 ? '📦 Під замовлення' : '🛒 Купити'}</button>
                            </div>
                        </div>
                        
                        <div class="specs">
                            <h3>📋 Характеристики</h3>
                            <div class="specs-grid">
                                <div><strong>Категорія:</strong> ${product.category || '—'}</div>
                                <div><strong>Підкатегорія:</strong> ${product.subcategory || product.subCategory || '—'}</div>
                                <div><strong>Країна:</strong> ${product.country || '—'}</div>
                                <div><strong>Габарити:</strong> ${product.width || '—'}×${product.height || '—'}×${product.depth || '—'} мм</div>
                                <div><strong>Вага:</strong> ${product.weight || '—'} кг</div>
                                <div><strong>ТН ВЕД:</strong> ${product.tnvd || '—'}</div>
                                <div><strong>EAN:</strong> ${product.ean || '—'}</div>
                                <div><strong>Гарантія:</strong> ${product.warr || '—'} ${product.warrunit === '2' ? 'міс.' : 'днів'}</div>
                                <div><strong>ПДВ:</strong> ${product.vat || 20}%</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Прив'язуємо події
                document.getElementById('minusBtn').onclick = () => changeQuantity(-1);
                document.getElementById('plusBtn').onclick = () => changeQuantity(1);
                document.getElementById('quantityInput').onchange = (e) => setQuantity(e.target.value);
                document.getElementById('buyBtn').onclick = () => addToCart();
                
                updateQuantityDisplay();
                
            } catch(e) {
                console.error('Помилка:', e);
                document.getElementById('productContent').innerHTML = `<div class="error">❌ Помилка: ${e.message}</div>`;
            }
        }
        
        loadProduct();
    </script>
</body>
</html>
